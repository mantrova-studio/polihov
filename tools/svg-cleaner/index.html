<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>SVG Cleaner — POLIHOV DEV STUDIO</title><link rel="stylesheet" href="../assets/css/style.css" /></head><body>
<div class="page"><header class="topbar"><a class="brand" href="../"><div class="brand-mark">P</div><div><div>POLIHOV DEV STUDIO</div><div class="brand-sub">SVG Cleaner</div></div></a><nav class="nav"><a class="nav-link" href="../">Главная</a><a class="nav-link active" href="./">SVG Cleaner</a></nav></header>
<section class="hero"><div class="badge">TOOL • SVG CLEANER</div><h1>Очистка и лёгкая оптимизация SVG</h1><p>Вставь SVG-код или загрузи файл, удали комментарии, лишние пробелы и служебный мусор, затем скачай очищенную версию.</p>
<div class="grid"><div class="card"><h2>Исходный SVG</h2><div class="actions"><input class="hidden-input" id="fileInput" type="file" accept=".svg,image/svg+xml,text/plain" /><button class="btn btn-primary" id="uploadBtn">Загрузить SVG</button><button class="btn btn-dark" id="cleanBtn">Очистить</button><button class="btn btn-danger" id="clearBtn">Очистить поле</button></div><div class="field" style="margin-top:16px"><label for="inputText">SVG-код</label><textarea id="inputText" placeholder="Вставь сюда SVG..."></textarea></div></div><div class="card"><h2>Результат</h2><div class="actions"><button class="btn btn-primary" id="downloadBtn" disabled>Скачать SVG</button><button class="btn btn-dark copy-btn" id="copyBtn" disabled>Копировать код</button></div><div class="field" style="margin-top:16px"><label for="outputText">Очищенный SVG</label><textarea id="outputText" readonly placeholder="Здесь появится очищенный код..."></textarea></div><div class="note" id="statusText">Ожидание SVG-кода.</div></div></div>
</section><div class="footer">© POLIHOV DEV STUDIO</div></div>
<script src="../assets/js/common.js"></script><script src="app.js"></script></body></html>
