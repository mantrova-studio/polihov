<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">
  <symbol id="icon-plus" viewBox="0 0 24 24">
    <line x1="12" y1="5" x2="12" y2="19"/>
    <line x1="5" y1="12" x2="19" y2="12"/>
  </symbol>

  <symbol id="icon-minus" viewBox="0 0 24 24">
    <line x1="5" y1="12" x2="19" y2="12"/>
  </symbol>

  <symbol id="icon-pencil" viewBox="0 0 24 24">
    <line x1="4" y1="20" x2="8" y2="19"/>
    <line x1="8" y1="19" x2="19" y2="8"/>
    <line x1="19" y1="8" x2="16" y2="5"/>
    <line x1="16" y1="5" x2="5" y2="16"/>
  </symbol>

  <symbol id="icon-check" viewBox="0 0 24 24">
    <polyline points="20 6 9 17 4 12"/>
  </symbol>

  <symbol id="icon-cloud" viewBox="0 0 24 24">
    <path d="M20 17.5a4.5 4.5 0 0 0-3.5-7.4 5.5 4.5 0 0 0-10.6 1.5A4 4 0 0 0 6 19h13a3 3 0 0 0 1-1.5z"/>
  </symbol>

  <symbol id="icon-order" viewBox="0 0 24 24">
    <path d="M4 6h10"/>
    <path d="M4 12h7"/>
    <path d="M4 18h4"/>
    <path d="M18 5v14"/>
    <path d="M15.5 8L18 5l2.5 3"/>
    <path d="M15.5 16L18 19l2.5-3"/>
  </symbol>

  <symbol id="icon-trash" viewBox="0 0 24 24">
    <line x1="4" y1="7" x2="20" y2="7"/>
    <line x1="10" y1="11" x2="10" y2="17"/>
    <line x1="14" y1="11" x2="14" y2="17"/>
    <path d="M6 7l1 14h10l1-14"/>
    <path d="M9 7V5h6v2"/>
  </symbol>

  <symbol id="icon-clock" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="8" fill="none"/>
    <line x1="12" y1="7" x2="12" y2="12"/>
    <line x1="12" y1="12" x2="15" y2="14"/>
  </symbol>

  <symbol id="icon-spinner" viewBox="0 0 24 24">
