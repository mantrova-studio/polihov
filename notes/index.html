<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Хранилище</title>
  <link rel="stylesheet" href="css/style.css" />
  <meta name="color-scheme" content="dark" />
</head>
<body class="is-locked">

<!--
  POLIHOV DEV STUDIO
  FILE: /notes/index.html
  DESC: Приложение «Vault / Notes» — разметка оболочки UI, контейнеры и модалки.
-->

  <div class="bg"></div>

  <!-- LOCK SCREEN -->
  <section class="lock" id="lockScreen" aria-hidden="false">
    <div class="lock__card">
      <div class="brand brand--center">
        <!--<div class="brand__dot"></div>-->
        <div class="brand__text">
          <div class="brand__title">ХРАНИЛИЩЕ</div>
          <div class="brand__sub"> </div>
        </div>
      </div>

      <form class="form" id="loginForm" autocomplete="on">
        <div class="row row--2">
          <div class="field">
            <span class="field__label">Хранилище</span>
            <div class="dd" id="vaultSelectDD"></div>
          </div>

          <div class="field">
            <span class="field__label">Действия</span>
            <div class="row">
              <button class="btn btn--ghost" id="createVaultBtn" type="button">Создать</button>
              <button class="btn btn--ghost" id="importVaultBtn" type="button">Импорт из GitHub</button>
            </div>
          </div>
        </div>

        <label class="field">
          <span class="field__label">Пароль</span>
          <div class="pass">
            <input class="input" id="passwordInput" type="password" placeholder="Введите пароль" required />
            <button class="iconBtn iconBtn--in" id="toggleLoginPass" type="button" aria-label="Показать пароль" title="Показать пароль"><img src="assets/icons/password.svg" alt=""></button>
          </div>
        </label>

        <label class="check">
          <input type="checkbox" id="rememberCheck" />
          <span>Запомнить выбранное хранилище на устройстве</span>
        </label>

        <div class="row">
          <button class="btn btn--primary" type="submit">Войти</button>
        </div>

        <!--<div class="hint">
          <span class="dot"></span>
          Пароль не хранится. Если забудешь — восстановить данные невозможно.
        </div>-->
      </form>
    </div>
  </section>

  <!-- APP -->
  <header class="topbar" id="topbar" aria-hidden="true">
    <div class="wrap topbar__inner">
      <div class="brand">
        <div class="brand__dot"></div>
        <div class="brand__text">
          <div class="brand__title" id="activeVaultTitle">Хранилище</div>
          <div class="brand__sub" id="activeVaultSub">—</div>
        </div>
      </div>

      <div class="topbar__actions">
        <button class="btn btn--ghost" id="settingsBtn" type="button"><img src="assets/icons/gear.svg" alt=""></button>
        <button class="btn btn--ghost" id="lockBtn" type="button"><img src="assets/icons/logout.svg" alt=""></button>
      </div>
    </div>
  </header>

  <main class="wrap app" id="appRoot" aria-hidden="true">
    <section class="grid">
      <section class="card">
        <div class="card__head">
          <h2 class="h2">Записи</h2>
          <!--<p class="muted">Тип записи — любое название (“Пароли”, “Клиенты”, “Сервера”…).</p>-->
        </div>

        <div class="toolbar">
          <input class="input" id="searchInput" type="text" placeholder="Поиск…" />
          <div class="dd" id="typeFilterDD"></div>
          <button class="btn btn--primary" id="newBtn" type="button">+ Новая</button>
        </div>

        <div class="list" id="list"></div>
        <div class="empty" id="emptyState" hidden>Пусто. Создай первую запись.</div>
      </section>

      <section class="card">
        <div class="card__head">
          <h2 class="h2">Редактор</h2>
          <p class="muted" id="editorSub">Выбери запись слева или создай новую.</p>
        </div>

        <form class="form" id="editForm">
          <label class="field">
            <span class="field__label">Заголовок</span>
            <input class="input" id="titleInput" type="text" placeholder="Например: Доступы к хостингу" />
          </label>

          <div class="row row--2">
            <label class="field">
              <span class="field__label">Тип (свой)</span>
              <input class="input" id="typeInput" type="text" placeholder="Например: Клиенты" list="typeHints" />
              <datalist id="typeHints"></datalist>
            </label>

            <div class="field">
              <span class="field__label">Быстрые действия</span>
              <div class="row">
                <button class="btn btn--ghost" id="copyBtn" type="button">Скопировать</button>
                <button class="btn btn--danger" id="delBtn" type="button">Удалить</button>
              </div>
            </div>
          </div>

          <!-- TEXT (sticky toolbar inside)
               NOTE: раньше здесь был <label>. Это ломало поведение клика по contenteditable,
               потому что label «активирует» первый labelable-элемент внутри (кнопку Bold).
               Теперь это обычный <div class="field">, чтобы клик по редактору НЕ нажимал кнопку.
          -->
          <div class="field">
            <span class="field__label">Текст</span>

            <div class="rtxWrap" id="rtxWrap">
              <div class="rtxScroll" id="rtxScroll">
  <div class="rtx" id="bodyInput" contenteditable="true" spellcheck="false"
       data-placeholder="Логины, пароли, ссылки, чек-листы…"></div>

  <div class="fmtBar fmtBar--in" id="fmtBar" aria-label="Форматирование">
    <button class="fmb" type="button" data-cmd="bold" title="Жирный"><b>B</b></button>
    <button class="fmb" type="button" data-cmd="italic" title="Курсив"><i>I</i></button>
    <button class="fmb" type="button" data-cmd="underline" title="Подчеркнуть"><u>U</u></button>
    <button class="fmb" type="button" data-cmd="strikeThrough" title="Зачеркнуть"><s>S</s></button>
    <span class="fmbSep"></span>
    <button class="fmb" type="button" data-cmd="spoiler" title="Спойлер">▧</button>
    <button class="fmb fmb--ghost" type="button" data-cmd="reset" title="Обычный">Aa</button>
  </div>
</div>
            </div>
          </div>

          <div class="row">
            <button class="btn btn--primary" id="applyBtn" type="submit">Применить</button>
            <button class="btn btn--ghost" id="saveGithubBtn" type="button">Сохранить</button>
            <div class="spacer"></div>
            <span class="muted" id="statusLine"></span>
          </div>
        </form>
      </section>
    </section>

    <footer class="footer">
      <div class="footer__inner">
        <span>© POLIHOV DEV STUDIO</span>
        <!--<span class="muted">Vault</span>-->
      </div>
    </footer>
  </main>

  <div class="toast" id="toast" hidden></div>

  <!-- MODAL -->
  <div class="modal" id="modal" hidden aria-hidden="true">
    <div class="modal__overlay" data-close="1"></div>
    <div class="modal__panel" role="dialog" aria-modal="true">
      <div class="modal__head">
        <div class="modal__title" id="modalTitle">Заголовок</div>
        <button class="iconBtn" type="button" data-close="1" aria-label="Закрыть">✕</button>
      </div>
      <div class="modal__body" id="modalBody"></div>
      <div class="modal__foot" id="modalFoot"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
